name: Deploy to Cloudflare

# Builds the static Next.js export and deploys the Worker (+ assets, + D1 binding)
# on every push to main. App secrets (ALLSECURE_*, RESEND_API_KEY, FISCAL_*) are NOT
# set here — they live in Cloudflare, set once via `wrangler secret put`. See DEPLOY.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys.
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check the Worker
        run: npm run cf:typecheck

      - name: Build static site (next build -> ./out)
        run: npm run build

      - name: Deploy Worker + assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler reads wrangler.jsonc: main=src/worker/index.ts, assets=./out, D1 binding.
          command: deploy
